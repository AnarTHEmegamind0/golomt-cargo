name: Sync OpenAPI Spec

on:
  workflow_dispatch:

jobs:
  sync-openapi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync OpenAPI
        run: bun run openapi:sync
        env:
          OPENAPI_URL: https://cargo-back.darjs.workers.dev/openapi/json

      - name: Commit changes
        run: |
          if git diff --quiet -- openapi/openapi.json; then
            echo "No OpenAPI changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add openapi/openapi.json
          git commit -m "chore: sync OpenAPI spec"
          git push
